name: Stock Monitor CI/CD Pipeline

on:
  push:
    branches: [ main, develop, feature/* ]
  pull_request:
    branches: [ main, develop ]
  release:
    types: [ published ]
  workflow_dispatch:
    inputs:
      environment:
        description: 'Deployment environment'
        required: true
        default: 'staging'
        type: choice
        options:
        - development
        - staging
        - production

env:
  PYTHON_VERSION: '3.11'
  AZURE_WEBAPP_NAME: stock-monitor-api
  AZURE_RESOURCE_GROUP: stock-monitor-rg
  AZURE_SUBSCRIPTION_ID: ${{ secrets.AZURE_SUBSCRIPTION_ID }}

jobs:
  # Code Quality and Testing
  code-quality:
    name: Code Quality & Testing
    runs-on: ubuntu-latest
    timeout-minutes: 30
    
    steps:
    - name: Checkout code
      uses: actions/checkout@v4
      with:
        fetch-depth: 0
    
    - name: Set up Python ${{ env.PYTHON_VERSION }}
      uses: actions/setup-python@v5
      with:
        python-version: ${{ env.PYTHON_VERSION }}
        cache: 'pip'
    
    - name: Install system dependencies
      run: |
        sudo apt-get update
        sudo apt-get install -y postgresql-client redis-tools
    
    - name: Install Python dependencies
      run: |
        python -m pip install --upgrade pip
        pip install -r requirements.txt
        pip install -r requirements.desktop.txt
    
    - name: Run linting and code formatting
      run: |
        # Run black for code formatting
        black --check --diff src/ tests/
        
        # Run flake8 for linting
        flake8 src/ tests/ --max-line-length=100 --extend-ignore=E203,W503
        
        # Run mypy for type checking
        mypy src/ --ignore-missing-imports
    
    - name: Run security checks
      run: |
        # Run bandit for security vulnerabilities
        pip install bandit
        bandit -r src/ -f json -o bandit-report.json || true
        
        # Run safety for dependency vulnerabilities
        pip install safety
        safety check --json --output safety-report.json || true
    
    - name: Run unit tests
      if: ${{ hashFiles('tests/**/*.py') != '' }}
      run: |
        # Start PostgreSQL and Redis services
        sudo systemctl start postgresql
        sudo systemctl start redis-server
        
        # Wait for services to be ready
        sleep 10
        
        # Run tests with coverage
        pytest tests/ --cov=src --cov-report=xml --cov-report=html --cov-report=term-missing -v
    
    - name: Upload coverage reports
      if: ${{ hashFiles('tests/**/*.py') != '' }}
      uses: codecov/codecov-action@v3
      with:
        file: ./coverage.xml
        flags: unittests
        name: code-coverage
    
    - name: Upload test results
      uses: actions/upload-artifact@v4
      if: always()
      with:
        name: test-results
        path: |
          coverage.xml
          htmlcov/
          bandit-report.json
          safety-report.json

  # Integration Testing
  integration-tests:
    name: Integration Tests
    runs-on: ubuntu-latest
    needs: code-quality
    timeout-minutes: 45
    
    services:
      postgres:
        image: postgres:13
        env:
          POSTGRES_PASSWORD: postgres
          POSTGRES_DB: stock_monitor_test
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
        ports:
          - 5432:5432
      
      redis:
        image: redis:6-alpine
        options: >-
          --health-cmd "redis-cli ping"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
        ports:
          - 6379:6379
    
    steps:
    - name: Checkout code
      uses: actions/checkout@v4
    
    - name: Set up Python ${{ env.PYTHON_VERSION }}
      uses: actions/setup-python@v5
      with:
        python-version: ${{ env.PYTHON_VERSION }}
        cache: 'pip'
    
    - name: Install dependencies
      run: |
        python -m pip install --upgrade pip
        pip install -r requirements.txt
        pip install -r requirements.desktop.txt
    
    - name: Run integration tests
      if: ${{ hashFiles('tests/**/*.py') != '' }}
      env:
        DATABASE_URL: postgresql://postgres:postgres@localhost:5432/stock_monitor_test
        REDIS_URL: redis://localhost:6379/0
        TESTING: true
      run: |
        # Wait for services to be ready
        sleep 15
        
        # Run integration tests
        pytest tests/ -m "integration" --cov=src --cov-report=xml -v
    
    - name: Upload integration test coverage
      if: ${{ hashFiles('tests/**/*.py') != '' }}
      uses: codecov/codecov-action@v3
      with:
        file: ./coverage.xml
        flags: integration
        name: integration-coverage

  # Performance Testing
  performance-tests:
    name: Performance Tests
    runs-on: ubuntu-latest
    needs: code-quality
    timeout-minutes: 30
    
    steps:
    - name: Checkout code
      uses: actions/checkout@v4
    
    - name: Set up Python ${{ env.PYTHON_VERSION }}
      uses: actions/setup-python@v5
      with:
        python-version: ${{ env.PYTHON_VERSION }}
        cache: 'pip'
    
    - name: Install dependencies
      run: |
        python -m pip install --upgrade pip
        pip install -r requirements.txt
        pip install locust
    
    - name: Run performance tests
      if: ${{ hashFiles('tests/performance/**/*.py') != '' }}
      run: |
        # Start the application in background
        python src/main.py &
        APP_PID=$!
        
        # Wait for app to start
        sleep 30
        
        # Run Locust performance tests
        locust -f tests/performance/locustfile.py --headless --users 50 --spawn-rate 10 --run-time 5m --html performance-report.html
        
        # Stop the application
        kill $APP_PID
    
    - name: Upload performance report
      uses: actions/upload-artifact@v4
      with:
        name: performance-report
        path: performance-report.html

  # Build and Package
  build:
    name: Build & Package
    runs-on: ubuntu-latest
    needs: [code-quality, integration-tests, performance-tests]
    timeout-minutes: 20
    
    steps:
    - name: Checkout code
      uses: actions/checkout@v4
    
    - name: Set up Python ${{ env.PYTHON_VERSION }}
      uses: actions/setup-python@v5
      with:
        python-version: ${{ env.PYTHON_VERSION }}
        cache: 'pip'
    
    - name: Install build dependencies
      run: |
        python -m pip install --upgrade pip
        pip install build wheel setuptools
    
    - name: Build package
      run: |
        python -m build --wheel --outdir dist/
    
    - name: Create deployment package
      run: |
        # Create deployment directory
        mkdir -p deployment/
        
        # Copy application files
        cp -r src/ deployment/
        cp -r config/ deployment/
        cp -r requirements*.txt deployment/
        cp -r azure/ deployment/
        
        # Copy Docker files
        cp docker-compose*.yml deployment/
        cp -r docker/ deployment/
        
        # Create deployment script
        cat > deployment/deploy.sh << 'EOF'
        #!/bin/bash
        echo "Deploying Stock Monitor System..."
        
        # Set environment
        export $(cat .env | xargs)
        
        # Start services
        docker-compose -f docker-compose.yml up -d
        
        echo "Deployment completed successfully!"
        EOF
        
        chmod +x deployment/deploy.sh
        
        # Create tar archive
        tar -czf stock-monitor-deployment.tar.gz deployment/
    
    - name: Upload deployment package
      uses: actions/upload-artifact@v3
      with:
        name: deployment-package
        path: stock-monitor-deployment.tar.gz

  # Deploy to Development
  deploy-development:
    name: Deploy to Development
    runs-on: ubuntu-latest
    needs: build
    if: github.ref == 'refs/heads/develop' || github.event.inputs.environment == 'development'
    environment: development
    timeout-minutes: 30
    
    steps:
    - name: Download deployment package
      uses: actions/download-artifact@v4
      with:
        name: deployment-package
    
    - name: Deploy to Azure App Service (Development)
      uses: azure/webapps-deploy@v2
      with:
        app-name: ${{ env.AZURE_WEBAPP_NAME }}-dev
        package: .
        startup-command: 'gunicorn --bind=0.0.0.0 --workers 2 src.flask_api.app:app'
    
    - name: Run smoke tests
      run: |
        # Wait for deployment
        sleep 60
        
        # Test health endpoint
        curl -f https://${{ env.AZURE_WEBAPP_NAME }}-dev.azurewebsites.net/health || exit 1
        
        echo "Development deployment successful!"

  # Deploy to Staging
  deploy-staging:
    name: Deploy to Staging
    runs-on: ubuntu-latest
    needs: build
    if: github.ref == 'refs/heads/main' || github.event.inputs.environment == 'staging'
    environment: staging
    timeout-minutes: 30
    
    steps:
    - name: Download deployment package
      uses: actions/download-artifact@v4
      with:
        name: deployment-package
    
    - name: Deploy to Azure App Service (Staging)
      uses: azure/webapps-deploy@v2
      with:
        app-name: ${{ env.AZURE_WEBAPP_NAME }}-staging
        package: .
        startup-command: 'gunicorn --bind=0.0.0.0 --workers 4 src.flask_api.app:app'
    
    - name: Run staging tests
      run: |
        # Wait for deployment
        sleep 60
        
        # Test API endpoints
        BASE_URL="https://${{ env.AZURE_WEBAPP_NAME }}-staging.azurewebsites.net"
        
        # Health check
        curl -f "$BASE_URL/health" || exit 1
        
        # API endpoints test
        curl -f "$BASE_URL/api/v1/analytics/market/overview" || exit 1
        
        echo "Staging deployment successful!"

  # Deploy to Production
  deploy-production:
    name: Deploy to Production
    runs-on: ubuntu-latest
    needs: build
    if: github.event_name == 'release' || github.event.inputs.environment == 'production'
    environment: production
    timeout-minutes: 45
    
    steps:
    - name: Download deployment package
      uses: actions/download-artifact@v4
      with:
        name: deployment-package
    
    - name: Deploy to Azure App Service (Production)
      uses: azure/webapps-deploy@v2
      with:
        app-name: ${{ env.AZURE_WEBAPP_NAME }}
        package: .
        startup-command: 'gunicorn --bind=0.0.0.0 --workers 8 --worker-class gunicorn.workers.ggevent src.flask_api.app:app'
    
    - name: Run production validation
      run: |
        # Wait for deployment
        sleep 90
        
        # Comprehensive API testing
        BASE_URL="https://${{ env.AZURE_WEBAPP_NAME }}.azurewebsites.net"
        
        # Health check
        curl -f "$BASE_URL/health" || exit 1
        
        # Core API endpoints
        curl -f "$BASE_URL/api/v1/analytics/market/overview" || exit 1
        curl -f "$BASE_URL/api/v1/analytics/stock/AAPL" || exit 1
        
        # Performance test
        curl -f "$BASE_URL/api/v1/analytics/anomalies" || exit 1
        
        echo "Production deployment successful!"
    
    - name: Notify deployment success
      run: |
        echo "🚀 Production deployment completed successfully!"
        echo "📊 API available at: https://${{ env.AZURE_WEBAPP_NAME }}.azurewebsites.net"
        echo "📈 Health check: https://${{ env.AZURE_WEBAPP_NAME }}.azurewebsites.net/health"

  # IoT System Testing
  iot-testing:
    name: IoT System Testing
    runs-on: ubuntu-latest
    needs: code-quality
    timeout-minutes: 30
    
    steps:
    - name: Checkout code
      uses: actions/checkout@v4
    
    - name: Set up Python ${{ env.PYTHON_VERSION }}
      uses: actions/setup-python@v5
      with:
        python-version: ${{ env.PYTHON_VERSION }}
        cache: 'pip'
    
    - name: Install dependencies
      run: |
        python -m pip install --upgrade pip
        pip install -r requirements.txt
        pip install azure-iot-device
    
    - name: Test IoT simulator
      run: |
        # Test IoT simulator without Azure connection
        python -c "
        import asyncio
        from src.iot.iot_simulator import IoTDataSimulator
        from src.utils.config import Config
        
        async def test_simulator():
            config = Config()
            simulator = IoTDataSimulator(config)
            
            # Test device creation
            simulator.create_simulated_devices(5)
            assert len(simulator.devices) == 5
            
            # Test telemetry generation
            device = list(simulator.devices.values())[0]
            telemetry = simulator.generate_telemetry_data(device)
            assert telemetry.device_id == device.device_id
            
            print('IoT simulator tests passed!')
        
        asyncio.run(test_simulator())
        "
    
    - name: Test IoT configuration
      run: |
        python -c "
        from src.iot.config import IoTConfig, load_iot_config
        
        # Test default config
        config = IoTConfig()
        assert config.simulation['num_devices'] == 50
        
        # Test config validation
        assert config.validate_config()
        
        print('IoT configuration tests passed!')
        "

  # Security Scanning
  security-scan:
    name: Security Scanning
    runs-on: ubuntu-latest
    needs: code-quality
    timeout-minutes: 20
    
    steps:
    - name: Checkout code
      uses: actions/checkout@v4
    
    - name: Run Trivy vulnerability scanner
      uses: aquasecurity/trivy-action@master
      with:
        scan-type: 'fs'
        scan-ref: '.'
        format: 'sarif'
        output: 'trivy-results.sarif'
    
    - name: Upload Trivy scan results
      uses: github/codeql-action/upload-sarif@v2
      with:
        sarif_file: 'trivy-results.sarif'
    
    - name: Run OWASP ZAP security scan
      uses: zaproxy/action-full-scan@v0.8.0
      with:
        target: 'https://${{ env.AZURE_WEBAPP_NAME }}-staging.azurewebsites.net'
        rules_file_name: '.zap/rules.tsv'
        cmd_options: '-a'

  # Documentation Generation
  docs:
    name: Generate Documentation
    runs-on: ubuntu-latest
    needs: code-quality
    timeout-minutes: 15
    
    steps:
    - name: Checkout code
      uses: actions/checkout@v4
    
    - name: Set up Python ${{ env.PYTHON_VERSION }}
      uses: actions/setup-python@v5
      with:
        python-version: ${{ env.PYTHON_VERSION }}
        cache: 'pip'
    
    - name: Install documentation dependencies
      run: |
        python -m pip install --upgrade pip
        pip install sphinx sphinx-rtd-theme sphinx-autodoc-typehints
    
    - name: Generate API documentation
      run: |
        # Generate Flask API docs
        cd src/flask_api
        python -c "
        from app import app
        with app.test_client() as client:
            # Generate OpenAPI spec
            response = client.get('/openapi.json')
            if response.status_code == 200:
                with open('openapi.json', 'w') as f:
                    f.write(response.data.decode())
                print('OpenAPI spec generated')
        "
    
    - name: Upload documentation
      uses: actions/upload-artifact@v4
      with:
        name: api-documentation
        path: |
          src/flask_api/openapi.json
          docs/

# Post-deployment notifications
  notify:
    name: Notify Team
    runs-on: ubuntu-latest
    needs: [deploy-production, deploy-staging, deploy-development]
    if: always()
    
    steps:
    - name: Notify deployment status
      run: |
        echo "🎯 Deployment Summary:"
        echo "✅ Code Quality: ${{ needs.code-quality.result }}"
        echo "✅ Integration Tests: ${{ needs.integration-tests.result }}"
        echo "✅ Performance Tests: ${{ needs.performance-tests.result }}"
        echo "✅ Build: ${{ needs.build.result }}"
        echo "✅ IoT Testing: ${{ needs.iot-testing.result }}"
        echo "✅ Security Scan: ${{ needs.security-scan.result }}"
        
        if [ "${{ needs.deploy-production.result }}" == "success" ]; then
          echo "🚀 Production deployment successful!"
        fi
        
        if [ "${{ needs.deploy-staging.result }}" == "success" ]; then
          echo "🔧 Staging deployment successful!"
        fi
        
        if [ "${{ needs.deploy-development.result }}" == "success" ]; then
          echo "🧪 Development deployment successful!"
        fi

